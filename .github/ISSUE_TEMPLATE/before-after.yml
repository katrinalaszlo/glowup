name: 📸 Share a before and after
description: Show what glowup changed in a CLI, tool, or agent skill.
title: "[before/after] "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping glowup learn from real use. Before sharing, redact credentials, tokens, personal data, account IDs, private endpoints, and local paths.
  - type: dropdown
    id: target-type
    attributes:
      label: What did you glow up?
      options:
        - CLI
        - Developer tool
        - Agent skill
        - Another terminal experience
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: What were you trying to improve?
      description: Describe the task and the part of the experience you wanted to change.
    validations:
      required: true
  - type: textarea
    id: pair
    attributes:
      label: Before and after
      description: Show the same task and data before and after. Use screenshots, terminal captures, or prompt-and-output excerpts.
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Tool or skill
      description: Add its name and a link if it is public.
    validations:
      required: false
  - type: input
    id: perspective
    attributes:
      label: Your perspective
      description: Design engineer, designer, engineer, or something else—only if it adds useful context.
    validations:
      required: false
  - type: textarea
    id: what-you-noticed
    attributes:
      label: What did you notice?
      description: What improved, regressed, surprised you, or still feels unclear?
    validations:
      required: true
