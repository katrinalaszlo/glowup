name: 📸 Share a before and after
description: Show what glowup changed in a CLI, tool, or agent skill.
title: "[before/after] "
labels: ["show-and-tell"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping glowup learn from real use. Before sharing, redact credentials, tokens, personal data, account IDs, private endpoints, and local paths.
  - type: textarea
    id: pair
    attributes:
      label: Visual before and after
      description: Drag or paste the exported glowup-before-after PNG here so it displays inline. If the full export is a PDF, add its PNG preview here and attach or link the PDF.
      placeholder: Drag or paste the Before/After image here.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: In one to three sentences, name the tool or task and what you wanted to improve.
    validations:
      required: true
  - type: textarea
    id: changes
    attributes:
      label: What changed?
      description: Add up to three short bullets about what improved and anything that still needs work.
    validations:
      required: false
  - type: input
    id: target
    attributes:
      label: Link (optional)
      description: Link to the tool, skill, pull request, or full PDF if it is public.
    validations:
      required: false
