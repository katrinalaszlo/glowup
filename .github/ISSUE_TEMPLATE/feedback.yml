name: 💬 Feedback
description: Something broke, read wrong, or could be better.
labels: ["feedback"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Screenshots are welcome after redacting secrets and private data. If automated or structured output changed unexpectedly, include the command and relevant diff.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: false
